name: dev (x86 pipeline + tests)

# Cheap x86 gate that runs on every push: validates the analysis pipeline on
# real (float, x86) measurements and runs the unit tests. It deliberately does
# NOT produce Arm numbers — that is the Arm workflow's job. This proves the
# instrument is sound before any silicon is measured.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest   # x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package + test deps
        run: pip install -e . pytest
      - name: Smoke-compile the scalar kernel path (no -march)
        working-directory: bench/microkernel
        run: cc -O3 -std=c11 -DABLATION_LABEL=\"off\" kernel.c bandwidth.c driver.c -o bench_scalar && ./bench_scalar
      - name: Run unit tests
        run: pytest -q
      - name: Validate pipeline on real x86 measurements
        run: python -m tokonomics dev
      - name: Build projection map
        run: python -m tokonomics project
      - name: Regenerate REPORT.md
        run: python -m tokonomics report
