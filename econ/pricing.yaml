# pricing.yaml — reference inputs (NOT magic numbers).
#
# Each row is public on-demand pricing for a 4-vCPU compute-optimized SKU,
# plus a TDP-derived power figure. usd_per_hour is REAL published pricing;
# tdp_watt is an ESTIMATE (cloud vendors don't expose per-instance socket
# power) and only feeds tokens/Joule, which is therefore labelled a projection.
#
# These are inputs you refresh: edit a row, re-run `make figures`, and every
# tokens/$ number + the crossover map regenerate. Verify each value at its
# source_url before quoting it.

machines:
